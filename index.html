<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Drive Mad | Loading Screen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a2f44, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Baloo 2', cursive;
      overflow: hidden;
      position: relative;
    }

    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255, 200, 100, 0.4);
      border-radius: 50%;
      animation: floatParticle 8s infinite linear;
      filter: blur(1px);
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      20% { opacity: 0.6; }
      80% { opacity: 0.8; }
      100% {
        transform: translateY(-20vh) rotate(360deg);
        opacity: 0;
      }
    }

    .intro-logo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #ff8c00, #c23600);
      z-index: 200;
      transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0.9s;
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 120px rgba(0,0,0,0.5);
    }

    .intro-logo.hide-intro {
      opacity: 0;
      visibility: hidden;
    }

    .intro-content {
      text-align: center;
      transform: scale(0.9);
      animation: introPop 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    @keyframes introPop {
      0% {
        opacity: 0;
        transform: scale(0.7) rotate(-5deg);
      }
      60% {
        opacity: 1;
        transform: scale(1.05) rotate(1deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0);
      }
    }

    .intro-logo img {
      width: 260px;
      max-width: 70vw;
      filter: drop-shadow(0 20px 35px rgba(0,0,0,0.5)) brightness(1.1);
      transition: transform 0.3s;
    }

    .intro-logo h1 {
      font-size: 3.4rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #FFF9C4, #FFE0B5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 5px 15px rgba(0,0,0,0.3);
      margin-top: 20px;
      font-weight: 800;
    }

    .intro-sub {
      font-size: 1rem;
      color: #ffeaac;
      margin-top: 10px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .loading-container {
      position: relative;
      z-index: 10;
      width: min(550px, 88%);
      background: rgba(15, 25, 35, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 64px;
      padding: 32px 28px 40px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,120,0,0.2) inset;
      transition: all 0.4s ease;
      opacity: 0;
      transform: translateY(30px) scale(0.96);
      transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .loading-container.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .car-scene {
      position: relative;
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
    }

    .car-wrapper {
      position: relative;
      width: 170px;
      height: 110px;
      animation: carFloat 2.2s ease-in-out infinite;
    }

    .car-body {
      position: relative;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
      transition: filter 0.2s;
    }

    .car-body img {
      width: 100%;
      display: block;
    }

    .wheel-custom {
      position: absolute;
      bottom: 12px;
      width: 42px;
      height: 42px;
      background: radial-gradient(circle at 30% 30%, #2c2e3a, #111);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.3);
      animation: wheelSpin 0.9s linear infinite;
    }

    .wheel-custom::after {
      content: "⚙️";
      font-size: 24px;
      opacity: 0.9;
      text-shadow: 0 0 3px cyan;
    }

    .wheel-left {
      left: 12px;
    }

    .wheel-right {
      right: 12px;
    }

    @keyframes wheelSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes carFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .road {
      width: 100%;
      height: 6px;
      background: repeating-linear-gradient(90deg, #ffb347, #ffb347 20px, #e08e2e 20px, #e08e2e 40px);
      margin-top: -8px;
      border-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      animation: roadMove 0.8s linear infinite;
    }

    @keyframes roadMove {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    .loading-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: bold;
      background: linear-gradient(120deg, #FFD966, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 12px 0 10px;
      letter-spacing: 1px;
    }

    .progress-area {
      margin: 15px 0 8px;
    }

    .progress-bar-bg {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 60px;
      height: 18px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4), 0 1px 1px rgba(255,255,255,0.2);
      backdrop-filter: blur(2px);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff9500, #ffdd55, #ffaa33);
      border-radius: 60px;
      box-shadow: 0 0 12px #ffa500;
      transition: width 0.12s linear;
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: rgba(255,255,255,0.3);
      transform: skewX(-20deg);
      animation: shine 1.4s infinite;
    }

    @keyframes shine {
      0% { transform: skewX(-20deg) translateX(-100px); }
      100% { transform: skewX(-20deg) translateX(300px); }
    }

    .percent-text {
      font-size: 1.7rem;
      font-weight: 800;
      text-align: center;
      color: #FFF2D0;
      text-shadow: 0 2px 5px #ff8c00;
      margin-top: 8px;
      font-family: monospace;
      letter-spacing: 2px;
    }

    .tips-card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 48px;
      padding: 12px 18px;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 180, 60, 0.5);
      transition: 0.2s;
    }

    .tips-icon {
      font-size: 28px;
      filter: drop-shadow(0 0 4px gold);
    }

    .tip-text {
      font-size: 1rem;
      color: #ffefcf;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.3px;
      word-break: break-word;
    }

    .loading-exit {
      opacity: 0 !important;
      transform: scale(0.94) translateY(20px) !important;
      transition: opacity 0.5s ease, transform 0.5s ease !important;
      pointer-events: none;
    }

    @media (max-width: 550px) {
      .loading-container { padding: 22px 18px 30px; }
      .car-wrapper { width: 130px; height: 85px; }
      .wheel-custom { width: 32px; height: 32px; }
      .wheel-custom::after { font-size: 18px; }
      .loading-title { font-size: 1.3rem; }
      .percent-text { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="intro-logo" id="introScreen">
  <div class="intro-content">
    <img src="logo.png" alt="Drive Mad Logo" onerror="this.src='https://placehold.co/400x200/ff6a00/white?text=DRIVE+MAD'; this.style.borderRadius='20px'">
    <h1>DRIVE MAD</h1>
    <div class="intro-sub">فشار حداکثر · هیجان ناب</div>
  </div>
</div>

<div class="loading-container" id="loadingScreen">
  <div class="car-scene">
    <div class="car-wrapper">
      <div class="car-body">
        <img src="car.jpg" alt="Car" onerror="this.src='https://placehold.co/300x140/ff9933/black?text=🔥+MAD+🔥'; this.style.borderRadius='12px'">
      </div>
      <div class="wheel-custom wheel-left"></div>
      <div class="wheel-custom wheel-right"></div>
    </div>
  </div>
  <div class="road"></div>

  <div class="loading-title">🔥 آماده برای دیوانگی 🔥</div>

  <div class="progress-area">
    <div class="progress-bar-bg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="percent-text" id="percentValue">0%</div>
  </div>

  <div class="tips-card" id="tipBox">
    <div class="tips-icon">💡</div>
    <div class="tip-text" id="dynamicTip">مواظب سرعت باش، تعادل کلید پیروزیه!</div>
  </div>
</div>

<script>
  (function() {
    const introDiv = document.getElementById('introScreen');
    const loadingDiv = document.getElementById('loadingScreen');
    const progressFill = document.getElementById('progressFill');
    const percentSpan = document.getElementById('percentValue');
    const tipElement = document.getElementById('dynamicTip');

    const proTips = [
      "🏁 گاز تدریجی، بهترین کنترل روی برف و گل!",
      "⚡ هر پیچ مثل قهرمانان رالی، ترمز دستی نرم!",
      "🎯 تعادل ماشین را با ماوس یا کیبورد حفظ کن.",
      "🔧 قبل از مسابقه لاستیک‌ها رو چک کن!",
      "💨 در Drive Mad، عجله بیش از حد = سقوط آزاد!",
      "🧠 از دنده سنگین روی سربالایی استفاده نکن.",
      "🏆 خونسرد باش و مسیر رو یه قدم جلوتر ببین.",
      "🔄 گاز و ترمز هماهنگ، شاسی بلند رو نجات میده."
    ];

    setTimeout(() => {
      if (introDiv) {
        introDiv.classList.add('hide-intro');
        setTimeout(() => {
          if (introDiv && introDiv.parentNode) introDiv.style.display = 'none';
        }, 1000);
      }
      loadingDiv.classList.add('visible');
    }, 2600);

    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      const particleCount = 65;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 8 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = 5 + Math.random() * 12 + 's';
        particle.style.animationDelay = Math.random() * 12 + 's';
        particle.style.background = `rgba(${150 + Math.random() * 105}, ${80 + Math.random() * 100}, 20, ${0.2 + Math.random() * 0.5})`;
        particle.style.boxShadow = `0 0 6px orange`;
        container.appendChild(particle);
      }
    }
    createParticles();

    let progress = 0;
    let interval = null;
    let tipInterval = null;

    function startTipRotation() {
      tipInterval = setInterval(() => {
        if (!tipElement) return;
        const randomTip = proTips[Math.floor(Math.random() * proTips.length)];
        tipElement.style.opacity = '0';
        setTimeout(() => {
          if (tipElement) tipElement.innerText = randomTip;
          tipElement.style.transition = 'opacity 0.2s';
          tipElement.style.opacity = '1';
        }, 150);
      }, 4200);
    }

    function simulateLoading() {
      interval = setInterval(() => {
        if (progress >= 100) {
          clearInterval(interval);
          if (tipInterval) clearInterval(tipInterval);
          progressFill.style.width = '100%';
          percentSpan.innerText = '100%';          setTimeout(() => {
            loadingDiv.classList.add('loading-exit');
            setTimeout(() => {
              window.location.href = "drive-mad.html";
            }, 650);
          }, 500);
          return;
        }

        let increment;
        if (progress < 30) {
          increment = Math.random() * 9 + 4.5;   
        } else if (progress < 65) {
          increment = Math.random() * 7 + 3;
        } else if (progress < 85) {
          increment = Math.random() * 5 + 2;
        } else {
          increment = Math.random() * 3 + 1.2;  
        }

        let newProgress = progress + increment;
        if (newProgress >= 100) newProgress = 100;
        progress = newProgress;
        const percentInt = Math.floor(progress);
        progressFill.style.width = progress + '%';
        percentSpan.innerText = percentInt + '%';

        if (percentInt === 42) percentSpan.style.textShadow = '0 0 8px #ffaa33';
        if (percentInt === 69) percentSpan.style.color = '#ffdd99';
        if (percentInt === 99) {
          percentSpan.style.animation = 'none';
          percentSpan.style.transform = 'scale(1.1)';
          setTimeout(() => { if(percentSpan) percentSpan.style.transform = ''; }, 200);
        }
      }, 210);
    }

    setTimeout(() => {
      startTipRotation();
      simulateLoading();
    }, 400);

    function handleImageErrors() {
      const carImg = document.querySelector('.car-body img');
      if (carImg && carImg.complete && carImg.naturalWidth === 0) {
        carImg.src = 'https://placehold.co/300x140/ff8800/black?text=🚗+MAD+🚗';
      }
      const logoImg = document.querySelector('.intro-logo img');
      if (logoImg && logoImg.complete && logoImg.naturalWidth === 0) {
        logoImg.src = 'https://placehold.co/400x200/d96c06/white?text=DRIVE+MAD';
      }
    }
    window.addEventListener('load', () => {
      handleImageErrors();
    });
    setTimeout(handleImageErrors, 1500);
  })();
</script>
</body>
</html>
